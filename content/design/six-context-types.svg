<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1190" viewBox="0 0 900 1190" font-family="Manrope, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0068FF"/>
      <stop offset="45%" stop-color="#3539F4"/>
      <stop offset="100%" stop-color="#BD03F7"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1190" fill="#FFFFFF"/>

  <!-- title -->
  <text x="40" y="52" font-size="28" font-weight="800" fill="#000000">The six types of context for AI agents</text>

  <!-- ============ connectors: clean orthogonal tree ============ -->
  <g stroke="#C4CCD8" stroke-width="1.5" fill="none" stroke-linecap="round">
    <!-- root to trunk -->
    <path d="M 280 604 H 322"/>
    <!-- trunk -->
    <path d="M 322 148 V 1060"/>
    <!-- trunk to type nodes -->
    <path d="M 322 148 H 360"/>
    <path d="M 322 336 H 360"/>
    <path d="M 322 496 H 360"/>
    <path d="M 322 656 H 360"/>
    <path d="M 322 844 H 360"/>
    <path d="M 322 1060 H 360"/>
    <!-- 1 Instructions -->
    <path d="M 580 148 H 620"/>
    <path d="M 620 92 V 204"/>
    <path d="M 620 92 H 660"/>
    <path d="M 620 148 H 660"/>
    <path d="M 620 204 H 660"/>
    <!-- 2 Examples -->
    <path d="M 580 336 H 620"/>
    <path d="M 620 308 V 364"/>
    <path d="M 620 308 H 660"/>
    <path d="M 620 364 H 660"/>
    <!-- 3 Knowledge -->
    <path d="M 580 496 H 620"/>
    <path d="M 620 468 V 524"/>
    <path d="M 620 468 H 660"/>
    <path d="M 620 524 H 660"/>
    <!-- 4 Memory -->
    <path d="M 580 656 H 620"/>
    <path d="M 620 628 V 684"/>
    <path d="M 620 628 H 660"/>
    <path d="M 620 684 H 660"/>
    <!-- 5 Tools -->
    <path d="M 580 844 H 620"/>
    <path d="M 620 788 V 900"/>
    <path d="M 620 788 H 660"/>
    <path d="M 620 844 H 660"/>
    <path d="M 620 900 H 660"/>
    <!-- 6 Guardrails -->
    <path d="M 580 1060 H 620"/>
    <path d="M 620 1004 V 1116"/>
    <path d="M 620 1004 H 660"/>
    <path d="M 620 1060 H 660"/>
    <path d="M 620 1116 H 660"/>
  </g>

  <!-- ============ root node (black, brand primary) ============ -->
  <g id="root">
    <rect x="40" y="564" width="240" height="80" rx="16" fill="#000000"/>
    <text x="160" y="597" font-size="18" font-weight="800" fill="#FFFFFF" text-anchor="middle">6 types of context</text>
    <text x="160" y="622" font-size="18" font-weight="800" fill="#FFFFFF" text-anchor="middle">for AI agents</text>
  </g>

  <!-- ============ type nodes (flat accent) ============ -->
  <g id="type-nodes">
    <g id="t1">
      <rect x="360" y="126" width="220" height="44" rx="12" fill="#0068FF"/>
      <text x="386" y="155" font-size="17" font-weight="800" fill="#FFFFFF" opacity="0.75">1</text>
      <text x="412" y="155" font-size="17" font-weight="800" fill="#FFFFFF">Instructions</text>
    </g>
    <g id="t2">
      <rect x="360" y="314" width="220" height="44" rx="12" fill="#0068FF"/>
      <text x="386" y="343" font-size="17" font-weight="800" fill="#FFFFFF" opacity="0.75">2</text>
      <text x="412" y="343" font-size="17" font-weight="800" fill="#FFFFFF">Examples</text>
    </g>
    <g id="t3">
      <rect x="360" y="474" width="220" height="44" rx="12" fill="#0068FF"/>
      <text x="386" y="503" font-size="17" font-weight="800" fill="#FFFFFF" opacity="0.75">3</text>
      <text x="412" y="503" font-size="17" font-weight="800" fill="#FFFFFF">Knowledge</text>
    </g>
    <g id="t4">
      <rect x="360" y="634" width="220" height="44" rx="12" fill="#0068FF"/>
      <text x="386" y="663" font-size="17" font-weight="800" fill="#FFFFFF" opacity="0.75">4</text>
      <text x="412" y="663" font-size="17" font-weight="800" fill="#FFFFFF">Memory</text>
    </g>
    <g id="t5">
      <rect x="360" y="822" width="220" height="44" rx="12" fill="#0068FF"/>
      <text x="386" y="851" font-size="17" font-weight="800" fill="#FFFFFF" opacity="0.75">5</text>
      <text x="412" y="851" font-size="17" font-weight="800" fill="#FFFFFF">Tools</text>
    </g>
    <g id="t6">
      <rect x="360" y="1038" width="220" height="44" rx="12" fill="#0068FF"/>
      <text x="386" y="1067" font-size="17" font-weight="800" fill="#FFFFFF" opacity="0.75">6</text>
      <text x="412" y="1067" font-size="17" font-weight="800" fill="#FFFFFF">Guardrails</text>
    </g>
  </g>

  <!-- ============ sub-nodes (light accent pills) ============ -->
  <g id="sub-nodes" font-size="15" font-weight="700" fill="#0068FF" text-anchor="middle">
    <rect x="660" y="76"   width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="97">Role</text>
    <rect x="660" y="132"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="153">Objective</text>
    <rect x="660" y="188"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="209">Requirements</text>
    <rect x="660" y="292"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="313">Behaviour</text>
    <rect x="660" y="348"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="369">Responses</text>
    <rect x="660" y="452"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="473">External</text>
    <rect x="660" y="508"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="529">Task</text>
    <rect x="660" y="612"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="633">Short-term</text>
    <rect x="660" y="668"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="689">Long-term</text>
    <rect x="660" y="772"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="793">Description</text>
    <rect x="660" y="828"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="849">Parameters</text>
    <rect x="660" y="884"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="905">Results</text>
    <rect x="660" y="988"  width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="1009">Inputs</text>
    <rect x="660" y="1044" width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="1065">Actions</text>
    <rect x="660" y="1100" width="180" height="32" rx="16" fill="#EAF2FF"/><text x="750" y="1121">Outputs</text>
  </g>

  <!-- ============ brand mark ============ -->
  <g id="mark">
    <circle cx="664" cy="1164" r="9" fill="url(#brandGrad)"/>
    <text x="682" y="1171" font-size="18" font-weight="700" fill="#000000">AI Engineering Series</text>
  </g>
</svg>
