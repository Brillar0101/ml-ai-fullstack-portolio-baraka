<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 680" font-family="'DM Sans', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4D4D4D"/>
    </marker>
    <marker id="ar-b" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#0068FF"/>
    </marker>
    <marker id="ar-o" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#F59E0B"/>
    </marker>
    <marker id="ar-g" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#10B981"/>
    </marker>
    <filter id="sh" x="-3%" y="-6%" width="106%" height="118%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="680" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="2" fill="#8C8C8C">SEQUENCE DIAGRAM</text>

  <!-- ========= ACTOR HEADERS ========= -->
  <!-- User -->
  <rect x="60" y="50" width="100" height="42" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5" filter="url(#sh)"/>
  <text x="110" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#4D4D4D">You</text>

  <!-- Your Code -->
  <rect x="290" y="50" width="120" height="42" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5" filter="url(#sh)"/>
  <text x="350" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">Your Code</text>

  <!-- LLM API -->
  <rect x="570" y="50" width="120" height="42" rx="8" fill="#EFF6FF" stroke="#0068FF" stroke-width="1.5" filter="url(#sh)"/>
  <text x="630" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#0068FF">LLM API</text>

  <!-- ========= LIFELINES (dashed vertical) ========= -->
  <line x1="110" y1="92" x2="110" y2="640" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="350" y1="92" x2="350" y2="640" stroke="#FDE68A" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="630" y1="92" x2="630" y2="640" stroke="#BFDBFE" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- ========= INTERACTION 1: User asks question ========= -->
  <line x1="110" y1="130" x2="340" y2="130" stroke="#4D4D4D" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="225" y="122" text-anchor="middle" font-size="11" fill="#4D4D4D">"Weather in Tokyo? Convert to Celsius."</text>

  <!-- ========= INTERACTION 2: Code sends to Claude ========= -->
  <line x1="350" y1="170" x2="620" y2="170" stroke="#0068FF" stroke-width="1.5" marker-end="url(#ar-b)"/>
  <text x="485" y="162" text-anchor="middle" font-size="11" fill="#0068FF">Send messages[]</text>

  <!-- ========= INTERACTION 3: Claude wants get_weather ========= -->
  <line x1="620" y1="220" x2="360" y2="220" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#ar-o)"/>
  <text x="490" y="212" text-anchor="middle" font-size="11" fill="#D97706">"I need get_weather("Tokyo")"</text>

  <!-- ========= ACTIVATION: Execute tool ========= -->
  <rect x="338" y="240" width="24" height="40" rx="4" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1"/>
  <text x="380" y="264" font-size="10" fill="#92400E">run get_weather()</text>

  <!-- ========= INTERACTION 4: Code sends result back ========= -->
  <line x1="350" y1="310" x2="620" y2="310" stroke="#10B981" stroke-width="1.5" marker-end="url(#ar-g)"/>
  <text x="485" y="302" text-anchor="middle" font-size="11" fill="#059669">messages[] + tool_result {temp: 72F}</text>

  <!-- ========= INTERACTION 5: Claude wants calculator ========= -->
  <line x1="620" y1="365" x2="360" y2="365" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#ar-o)"/>
  <text x="490" y="357" text-anchor="middle" font-size="11" fill="#D97706">"I need calculator("(72-32)*5/9")"</text>

  <!-- ========= ACTIVATION: Execute tool ========= -->
  <rect x="338" y="385" width="24" height="40" rx="4" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1"/>
  <text x="380" y="409" font-size="10" fill="#92400E">run calculator()</text>

  <!-- ========= INTERACTION 6: Code sends result back ========= -->
  <line x1="350" y1="455" x2="620" y2="455" stroke="#10B981" stroke-width="1.5" marker-end="url(#ar-g)"/>
  <text x="485" y="447" text-anchor="middle" font-size="11" fill="#059669">messages[] + tool_result {result: 22.2}</text>

  <!-- ========= INTERACTION 7: Claude gives final answer ========= -->
  <line x1="620" y1="510" x2="360" y2="510" stroke="#6366F1" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="490" y="502" text-anchor="middle" font-size="11" fill="#6366F1">"It's 72F (22.2C), partly cloudy"</text>

  <!-- ========= INTERACTION 8: Code returns to user ========= -->
  <line x1="340" y1="555" x2="120" y2="555" stroke="#4D4D4D" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="230" y="547" text-anchor="middle" font-size="11" fill="#4D4D4D">Final answer</text>

  <!-- ========= LOOP ANNOTATION ========= -->
  <!-- Loop box around interactions 3-6 -->
  <rect x="320" y="198" width="328" height="278" rx="6" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="320" y="198" width="60" height="20" rx="4" fill="#F3F4F6" stroke="#E0E0E0" stroke-width="1"/>
  <text x="350" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#8C8C8C">loop</text>

  <!-- ========= LEGEND ========= -->
  <rect x="50" y="610" width="680" height="40" rx="8" fill="#F3F4F6"/>
  <line x1="80" y1="630" x2="110" y2="630" stroke="#0068FF" stroke-width="1.5"/>
  <text x="118" y="634" font-size="10" fill="#4D4D4D">API call</text>

  <line x1="200" y1="630" x2="230" y2="630" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="238" y="634" font-size="10" fill="#4D4D4D">Tool request</text>

  <line x1="340" y1="630" x2="370" y2="630" stroke="#10B981" stroke-width="1.5"/>
  <text x="378" y="634" font-size="10" fill="#4D4D4D">Result sent back</text>

  <line x1="500" y1="630" x2="530" y2="630" stroke="#6366F1" stroke-width="1.5"/>
  <text x="538" y="634" font-size="10" fill="#4D4D4D">Final answer</text>
</svg>