<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'DM Sans', 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#8C8C8C"/>
    </marker>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="2" fill="#8C8C8C">THE TOOL CONTRACT</text>

  <!-- ============ COLUMN 1: Tool Schema ============ -->
  <rect x="30" y="60" width="240" height="260" rx="10" fill="#FFFFFF" stroke="#0068FF" stroke-width="1.5" filter="url(#sh)"/>

  <!-- Header bar -->
  <rect x="30" y="60" width="240" height="40" rx="10" fill="#0068FF"/>
  <rect x="30" y="80" width="240" height="20" fill="#0068FF"/>
  <text x="150" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">TOOL SCHEMA</text>

  <!-- JSON content with generous line spacing -->
  <text x="48" y="124" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">{</text>
  <text x="60" y="146" font-size="11" fill="#0068FF" font-family="'Fira Code', 'Consolas', monospace">"name"</text>
  <text x="112" y="146" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">: "get_weather",</text>

  <text x="60" y="170" font-size="11" fill="#0068FF" font-family="'Fira Code', 'Consolas', monospace">"description"</text>
  <text x="156" y="170" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">:</text>

  <text x="70" y="192" font-size="11" fill="#6366F1" font-family="'Fira Code', 'Consolas', monospace">"Get weather for</text>
  <text x="70" y="212" font-size="11" fill="#6366F1" font-family="'Fira Code', 'Consolas', monospace"> a city."</text>

  <text x="60" y="236" font-size="11" fill="#0068FF" font-family="'Fira Code', 'Consolas', monospace">"input_schema"</text>
  <text x="164" y="236" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">:</text>

  <text x="70" y="258" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">{ "city": string }</text>
  <text x="48" y="280" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">}</text>

  <!-- Subtitle -->
  <text x="150" y="344" text-anchor="middle" font-size="12" fill="#0068FF" font-weight="600">The LLM reads this</text>
  <text x="150" y="362" text-anchor="middle" font-size="10" fill="#8C8C8C">to decide WHEN to call</text>

  <!-- ============ ARROW 1 ============ -->
  <line x1="270" y1="190" x2="310" y2="190" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ COLUMN 2: Your Function ============ -->
  <rect x="318" y="60" width="240" height="260" rx="10" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" filter="url(#sh)"/>

  <!-- Header bar -->
  <rect x="318" y="60" width="240" height="40" rx="10" fill="#F59E0B"/>
  <rect x="318" y="80" width="240" height="20" fill="#F59E0B"/>
  <text x="438" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">YOUR FUNCTION</text>

  <!-- Python content -->
  <text x="336" y="124" font-size="11" fill="#6366F1" font-family="'Fira Code', 'Consolas', monospace">def</text>
  <text x="363" y="124" font-size="11" fill="#0068FF" font-family="'Fira Code', 'Consolas', monospace"> get_weather</text>
  <text x="462" y="124" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">(city):</text>

  <text x="348" y="150" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">resp = httpx.get(</text>
  <text x="360" y="174" font-size="11" fill="#6366F1" font-family="'Fira Code', 'Consolas', monospace">f"wttr.in/{city}"</text>
  <text x="348" y="198" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">)</text>

  <text x="348" y="224" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">data = resp.json()</text>

  <text x="348" y="252" font-size="11" fill="#6366F1" font-family="'Fira Code', 'Consolas', monospace">return</text>
  <text x="400" y="252" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace"> {</text>
  <text x="360" y="276" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">"city", "temp_f"...</text>
  <text x="348" y="298" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">}</text>

  <!-- Subtitle -->
  <text x="438" y="344" text-anchor="middle" font-size="12" fill="#D97706" font-weight="600">Your code runs this</text>
  <text x="438" y="362" text-anchor="middle" font-size="10" fill="#8C8C8C">when the LLM requests it</text>

  <!-- ============ ARROW 2 ============ -->
  <line x1="558" y1="190" x2="598" y2="190" stroke="#8C8C8C" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ============ COLUMN 3: Tool Result ============ -->
  <rect x="606" y="60" width="240" height="260" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#sh)"/>

  <!-- Header bar -->
  <rect x="606" y="60" width="240" height="40" rx="10" fill="#10B981"/>
  <rect x="606" y="80" width="240" height="20" fill="#10B981"/>
  <text x="726" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">TOOL RESULT</text>

  <!-- Dict content -->
  <text x="624" y="124" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">{</text>

  <text x="636" y="150" font-size="11" fill="#10B981" font-family="'Fira Code', 'Consolas', monospace">"city"</text>
  <text x="684" y="150" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">: "Tokyo",</text>

  <text x="636" y="176" font-size="11" fill="#10B981" font-family="'Fira Code', 'Consolas', monospace">"temp_f"</text>
  <text x="700" y="176" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">: "72",</text>

  <text x="636" y="202" font-size="11" fill="#10B981" font-family="'Fira Code', 'Consolas', monospace">"condition"</text>
  <text x="722" y="202" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">:</text>

  <text x="648" y="226" font-size="11" fill="#6366F1" font-family="'Fira Code', 'Consolas', monospace">"Partly cloudy",</text>

  <text x="636" y="252" font-size="11" fill="#10B981" font-family="'Fira Code', 'Consolas', monospace">"humidity"</text>
  <text x="714" y="252" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">: "65%"</text>

  <text x="624" y="278" font-size="11" fill="#4D4D4D" font-family="'Fira Code', 'Consolas', monospace">}</text>

  <!-- Subtitle -->
  <text x="726" y="344" text-anchor="middle" font-size="12" fill="#059669" font-weight="600">Sent back to the LLM</text>
  <text x="726" y="362" text-anchor="middle" font-size="10" fill="#8C8C8C">via json.dumps()</text>
</svg>