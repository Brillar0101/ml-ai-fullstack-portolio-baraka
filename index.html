    <!-- PatternFly is a light design system: pin light before React loads. -->
    <script>
      document.documentElement.setAttribute('data-theme', 'light');
    </script>

    <!-- PatternFly type: Red Hat Display (headings) + Red Hat Text (body)
         + Red Hat Mono. Loaded async so they don't block first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
