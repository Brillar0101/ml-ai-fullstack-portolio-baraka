<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description" content="Baraka - Computer Engineer specializing in ML/AI, Embedded Systems, and Hardware Design. Virginia Tech." />
    <meta name="keywords" content="Computer Engineer, ML Engineer, AI, Embedded Systems, Hardware Design, Python, PyTorch, React, Portfolio" />
    <meta name="author" content="Baraka" />
    <meta name="theme-color" content="#0068FF" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Baraka | Computer Engineer" />
    <meta property="og:description" content="Computer Engineer specializing in ML/AI, Embedded Systems, and Hardware Design." />
    <meta property="og:url" content="https://barakaeli.dev/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Baraka | Computer Engineer" />
    <meta name="twitter:description" content="Computer Engineer specializing in ML/AI, Embedded Systems, and Hardware Design." />

    <!-- Favicon (inline SVG monogram, brand blue) -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>Baraka | Computer Engineer</title>

    <!-- Anti-flash: set theme before React loads -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (!theme) theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <!-- Brand fonts: Manrope (display + body) + Fira Code (mono).
         Loaded async so they don't block first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://img.youtube.com" crossorigin>
    <link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
